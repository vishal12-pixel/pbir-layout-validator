name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build single-file Windows .exe
        run: pyinstaller --onefile --name pbir_validator pbir_validator/__main__.py

      - name: Smoke-test the built .exe
        run: dist/pbir_validator.exe --version

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pbir_validator.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
